name: Helm Charts

on:
  pull_request:
    paths:
      - 'helm/**'
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-render:
    name: Lint, Test, and Render (${{ matrix.chart }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - testnet-boutique
          - testnet-wallet
    steps:
      - uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add chart dependencies
        run: helm repo add interledger https://interledger.github.io/charts/interledger

      - name: Update chart dependencies
        run: helm dependency update helm/${{ matrix.chart }}

      - name: Lint chart
        run: helm lint helm/${{ matrix.chart }}

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version v1.1.1 --verify=false

      - name: Run unit tests
        run: helm unittest helm/${{ matrix.chart }}

      - name: Render chart with default values
        run: helm template ${{ matrix.chart }} helm/${{ matrix.chart }}
