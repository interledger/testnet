name: Build

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        package:
          [
            'wallet:backend',
            'wallet:frontend',
            'boutique:backend',
            'boutique:frontend'
          ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - uses: pnpm/action-setup@v3
        with:
          version: v9.1.4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.5'
          cache: 'pnpm'
      - name: Install dependencies for ${{ matrix.package }}
        shell: bash
        run: |
          pnpm ${{ matrix.package }} install --frozen-lockfile
      - name: Run build
        run: |
          pnpm ${{ matrix.package }} build
