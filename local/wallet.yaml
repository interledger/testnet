services:
  # Wallet
  wallet-backend:
    container_name: wallet-backend-local
    build:
      context: ../
      args:
        DEV_MODE: ${DEV_MODE:-true}
      dockerfile: ./packages/wallet/backend/Dockerfile.dev
    depends_on:
      - postgres
      - rafiki-backend
      - redis
      - mockgatehub
    volumes:
      - ../packages/wallet/backend:/home/testnet/packages/wallet/backend
      - ../packages/wallet/shared:/home/testnet/packages/wallet/shared
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${WALLET_BACKEND_PORT:-3003}
      DEBUG_PORT: ${WALLET_BACKEND_DEBUG_PORT:-9229}
      DATABASE_URL: ${WALLET_BACKEND_DATABASE_URL:-postgres://wallet_backend:wallet_backend@postgres-local/wallet_backend}
      COOKIE_NAME: ${WALLET_BACKEND_COOKIE_NAME:-testnet.cookie}
      COOKIE_PASSWORD: ${WALLET_BACKEND_COOKIE_PASSWORD:-testnet.cookie.password.super.secret.ilp}
      COOKIE_TTL: ${WALLET_BACKEND_COOKIE_TTL:-2630000}
      OPEN_PAYMENTS_HOST: ${WALLET_BACKEND_OPEN_PAYMENTS_HOST:-https://rafiki-backend}
      GRAPHQL_ENDPOINT: ${WALLET_BACKEND_GRAPHQL_ENDPOINT:-http://rafiki-backend:3001/graphql}
      AUTH_GRAPHQL_ENDPOINT: ${WALLET_BACKEND_AUTH_GRAPHQL_ENDPOINT:-http://rafiki-auth:3008/graphql}
      AUTH_DOMAIN: ${WALLET_BACKEND_AUTH_DOMAIN:-http://rafiki-auth:3006}
      AUTH_IDENTITY_SERVER_SECRET: ${AUTH_IDENTITY_SERVER_SECRET:-auth-secret-key-12345}
      RAFIKI_WEBHOOK_SIGNATURE_SECRET: ${RAFIKI_SIGNATURE_SECRET:-327132b5-99e9-4eb8-8a25-2b7d7738ece1}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@testnet.local}
      SEND_EMAIL: ${SEND_EMAIL:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GATEHUB_API_BASE_URL: ${GATEHUB_API_BASE_URL:-http://mockgatehub:8080}
      GATEHUB_ENV: ${GATEHUB_ENV:-sandbox}
      GATEHUB_IFRAME_BASE_URL: ${GATEHUB_IFRAME_BASE_URL:-https://mockgatehub.testnet.test}
      GATEHUB_ACCESS_KEY: ${GATEHUB_ACCESS_KEY:-local-test-app-id}
      GATEHUB_SECRET_KEY: ${GATEHUB_SECRET_KEY:-local-test-app-secret}
      GATEHUB_WEBHOOK_SECRET: ${GATEHUB_WEBHOOK_SECRET:-6d6f636b5f776562686f6f6b5f736563726574}
      GATEHUB_GATEWAY_UUID: ${GATEHUB_GATEWAY_UUID:-mock_gateway_uuid}
      GATEHUB_SETTLEMENT_WALLET_ADDRESS: ${GATEHUB_SETTLEMENT_WALLET_ADDRESS:-rMockSettlementAddress}
      GATEHUB_ORG_ID: ${GATEHUB_ORG_ID:-mock_org_id}
      GATEHUB_CARD_APP_ID: ${GATEHUB_CARD_APP_ID:-mock_card_app_id}
      RATE_LIMIT: ${RATE_LIMIT:-false}
      RATE_LIMIT_LEVEL: ${RATE_LIMIT_LEVEL:-LAX}
      GATEHUB_ACCOUNT_PRODUCT_CODE: ${GATEHUB_ACCOUNT_PRODUCT_CODE:-account_product}
      GATEHUB_CARD_PRODUCT_CODE: ${GATEHUB_CARD_PRODUCT_CODE:-card_product}
      GATEHUB_NAME_ON_CARD: ${GATEHUB_NAME_ON_CARD:-TestnetUser}
      GATEHUB_CARD_PP_PREFIX: ${GATEHUB_CARD_PP_PREFIX:-TEST}
      CARD_DATA_HREF: ${CARD_DATA_HREF:-https://card.example.com/data}
      CARD_PIN_HREF: ${CARD_PIN_HREF:-https://card.example.com/pin}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-notset}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-notset}
      USE_STRIPE: ${USE_STRIPE:-false}
      OPERATOR_TENANT_ID: ${OPERATOR_TENANT_ID:-f829c064-762a-4430-ac5d-7af5df198551}
      ADMIN_API_SECRET: ${ADMIN_API_SECRET:-secret-key}
      ADMIN_SIGNATURE_VERSION: ${ADMIN_SIGNATURE_VERSION:-1}
      WEBHOOK_SECRET: ${GATEHUB_WEBHOOK_SECRET:-6d6f636b5f776562686f6f6b5f736563726574}
    restart: always
    networks:
      - testnet
    ports:
      - '3003:3003'
      - '9229:9229' # Map debugger port to local machine's port 9229
    labels:
      - traefik.enable=true
      - traefik.docker.network=testnet
      - traefik.http.routers.wallet-backend.rule=Host(`api.testnet.test`)
      - traefik.http.routers.wallet-backend.entrypoints=websecure
      - traefik.http.routers.wallet-backend.tls=true
      - traefik.http.services.wallet-backend.loadbalancer.server.port=3003

  wallet-frontend:
    container_name: wallet-frontend-local
    build:
      context: ..
      args:
        DEV_MODE: ${DEV_MODE:-true}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://api.testnet.test}
        NEXT_PUBLIC_AUTH_HOST: ${NEXT_PUBLIC_AUTH_HOST:-https://auth.testnet.test}
        NEXT_PUBLIC_OPEN_PAYMENTS_HOST: ${NEXT_PUBLIC_OPEN_PAYMENTS_HOST:-https://rafiki-backend.testnet.test}
        NEXT_PUBLIC_GATEHUB_ENV: ${NEXT_PUBLIC_GATEHUB_ENV:-sandbox}
        NEXT_PUBLIC_THEME: ${NEXT_PUBLIC_THEME:-light}
        NEXT_PUBLIC_FEATURES_ENABLED: ${NEXT_PUBLIC_FEATURES_ENABLED:-false}
      dockerfile: ./packages/wallet/frontend/Dockerfile.dev
    depends_on:
      - wallet-backend
    volumes:
      - ../packages/wallet/frontend:/home/testnet/packages/wallet/frontend
      - ../packages/wallet/shared:/home/testnet/packages/wallet/shared
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      BACKEND_URL: ${WALLET_FRONTEND_BACKEND_URL:-http://wallet-backend:3003}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://api.testnet.test}
      NEXT_PUBLIC_AUTH_HOST: ${NEXT_PUBLIC_AUTH_HOST:-https://auth.testnet.test}
      NEXT_PUBLIC_OPEN_PAYMENTS_HOST: ${NEXT_PUBLIC_OPEN_PAYMENTS_HOST:-https://rafiki-backend.testnet.test}
      NEXT_PUBLIC_GATEHUB_ENV: ${NEXT_PUBLIC_GATEHUB_ENV:-sandbox}
      NEXT_PUBLIC_THEME: ${NEXT_PUBLIC_THEME:-light}
      NEXT_PUBLIC_FEATURES_ENABLED: ${NEXT_PUBLIC_FEATURES_ENABLED:-false}
    restart: always
    networks:
      - testnet
    ports:
      - '4003:4003'
    labels:
      - traefik.enable=true
      - traefik.docker.network=testnet
      - traefik.http.routers.wallet-frontend.rule=Host(`testnet.test`)
      - traefik.http.routers.wallet-frontend.entrypoints=websecure
      - traefik.http.routers.wallet-frontend.tls=true
      - traefik.http.services.wallet-frontend.loadbalancer.server.port=4003
