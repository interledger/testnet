services:
  redis:
    container_name: redis
    image: 'redis:7-alpine'
    restart: unless-stopped
    networks:
      - testnet
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
