services:
  # Rafiki
  rafiki-auth:
    container_name: rafiki-auth-local
    image: ghcr.io/interledger/rafiki-auth:v2.2.0-beta
    restart: always
    networks:
      - testnet
    ports:
      - '3006:3006'
      - '3008:3008'
      - '3009:3009'
    environment:
      AUTH_PORT: ${RAFIKI_AUTH_PORT}
      INTROSPECTION_PORT: ${RAFIKI_AUTH_INTROSPECTION_PORT}
      ADMIN_PORT: ${RAFIKI_AUTH_ADMIN_PORT}
      NODE_ENV: ${NODE_ENV}
      LOG_LEVEL: ${RAFIKI_AUTH_LOG_LEVEL}
      TRUST_PROXY: ${RAFIKI_AUTH_TRUST_PROXY}
      NODE_TLS_REJECT_UNAUTHORIZED: ${RAFIKI_AUTH_NODE_TLS_REJECT_UNAUTHORIZED}
      AUTH_SERVER_URL: ${RAFIKI_AUTH_SERVER_URL}
      AUTH_DATABASE_URL: ${RAFIKI_AUTH_DATABASE_URL}
      IDENTITY_SERVER_URL: ${AUTH_IDENTITY_SERVER_URL}
      IDENTITY_SERVER_SECRET: ${AUTH_IDENTITY_SERVER_SECRET}
      COOKIE_KEY: ${AUTH_COOKIE_KEY}
      INTERACTION_COOKIE_SAME_SITE: ${RAFIKI_AUTH_INTERACTION_COOKIE_SAME_SITE}
      WAIT_SECONDS: ${RAFIKI_AUTH_WAIT_SECONDS}
      OPERATOR_TENANT_ID: ${RAFIKI_OPERATOR_TENANT_ID}
      ADMIN_API_SECRET: ${RAFIKI_ADMIN_API_SECRET}
      ADMIN_SIGNATURE_VERSION: ${RAFIKI_ADMIN_SIGNATURE_VERSION}
      REDIS_URL: ${REDIS_URL}
    extra_hosts:
      - testnet.test:host-gateway
      - api.testnet.test:host-gateway
      - auth.testnet.test:host-gateway
      - rafiki-backend.testnet.test:host-gateway
      - rafiki-frontend.testnet.test:host-gateway
      - rafiki-card-service.testnet.test:host-gateway
      - mockgatehub.testnet.test:host-gateway
      - boutique.test:host-gateway
      - api.boutique.test:host-gateway
    depends_on:
      - postgres
    labels:
      - traefik.enable=true
      - traefik.docker.network=testnet
      - traefik.http.routers.rafiki-auth-grant.rule=Host(`auth.testnet.test`) && PathPrefix(`/grant`)
      - traefik.http.routers.rafiki-auth-grant.entrypoints=websecure
      - traefik.http.routers.rafiki-auth-grant.tls=true
      - traefik.http.routers.rafiki-auth-grant.priority=100
      - traefik.http.routers.rafiki-auth-grant.service=rafiki-auth-grant
      - traefik.http.services.rafiki-auth-grant.loadbalancer.server.port=3009
      - traefik.http.routers.rafiki-auth.rule=Host(`auth.testnet.test`)
      - traefik.http.routers.rafiki-auth.entrypoints=websecure
      - traefik.http.routers.rafiki-auth.tls=true
      - traefik.http.routers.rafiki-auth.service=rafiki-auth
      - traefik.http.services.rafiki-auth.loadbalancer.server.port=3006

  rafiki-backend:
    container_name: rafiki-backend-local
    image: ghcr.io/interledger/rafiki-backend:v2.2.0-beta
    restart: always
    privileged: true
    volumes:
      - ../temp/:/workspace/temp/
    ports:
      - '3011:3001'
      - '3010:3003'
      - '3005:3005'
      - '3002:3002'
    networks:
      - testnet
    environment:
      NODE_ENV: ${NODE_ENV}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      TRUST_PROXY: ${RAFIKI_BACKEND_TRUST_PROXY}
      ADMIN_PORT: ${RAFIKI_BACKEND_ADMIN_PORT}
      CONNECTOR_PORT: ${RAFIKI_BACKEND_CONNECTOR_PORT}
      OPEN_PAYMENTS_PORT: ${RAFIKI_BACKEND_OPEN_PAYMENTS_PORT}
      DATABASE_URL: ${RAFIKI_BACKEND_DATABASE_URL}
      USE_TIGERBEETLE: ${RAFIKI_BACKEND_USE_TIGERBEETLE}
      NONCE_REDIS_KEY: ${RAFIKI_BACKEND_NONCE_REDIS_KEY}
      AUTH_SERVER_GRANT_URL: ${RAFIKI_BACKEND_AUTH_SERVER_GRANT_URL}
      AUTH_SERVER_INTROSPECTION_URL: ${RAFIKI_BACKEND_AUTH_SERVER_INTROSPECTION_URL}
      ILP_ADDRESS: ${RAFIKI_BACKEND_ILP_ADDRESS}
      ILP_CONNECTOR_URL: ${RAFIKI_BACKEND_ILP_CONNECTOR_URL}
      STREAM_SECRET: ${RAFIKI_BACKEND_STREAM_SECRET}
      ADMIN_KEY: ${RAFIKI_BACKEND_ADMIN_KEY}
      OPEN_PAYMENTS_URL: ${RAFIKI_BACKEND_OPEN_PAYMENTS_URL}
      REDIS_URL: ${REDIS_URL}
      WALLET_ADDRESS_URL: ${RAFIKI_BACKEND_WALLET_ADDRESS_URL}
      WEBHOOK_URL: ${RAFIKI_BACKEND_WEBHOOK_URL}
      WEBHOOK_TIMEOUT: ${RAFIKI_BACKEND_WEBHOOK_TIMEOUT}
      SIGNATURE_SECRET: ${RAFIKI_SIGNATURE_SECRET}
      EXCHANGE_RATES_URL: ${RAFIKI_BACKEND_EXCHANGE_RATES_URL}
      ENABLE_AUTO_PEERING: ${RAFIKI_BACKEND_ENABLE_AUTO_PEERING}
      AUTO_PEERING_SERVER_PORT: ${RAFIKI_BACKEND_AUTO_PEERING_SERVER_PORT}
      INSTANCE_NAME: ${RAFIKI_BACKEND_INSTANCE_NAME}
      SLIPPAGE: ${RAFIKI_BACKEND_SLIPPAGE}
      KEY_ID: ${RAFIKI_BACKEND_KEY_ID}
      WALLET_ADDRESS_REDIRECT_HTML_PAGE: ${RAFIKI_BACKEND_WALLET_ADDRESS_REDIRECT_HTML_PAGE}
      OPERATOR_TENANT_ID: ${OPERATOR_TENANT_ID}
      ADMIN_API_SECRET: ${RAFIKI_ADMIN_API_SECRET}
      ADMIN_SIGNATURE_VERSION: ${ADMIN_SIGNATURE_VERSION}
      AUTH_SERVICE_API_URL: ${RAFIKI_BACKEND_AUTH_SERVICE_API_URL}
      CARD_SERVICE_URL: ${RAFIKI_BACKEND_CARD_SERVICE_URL}
      CARD_WEBHOOK_SERVICE_URL: ${RAFIKI_BACKEND_CARD_WEBHOOK_SERVICE_URL}
      POS_SERVICE_URL: ${RAFIKI_BACKEND_POS_SERVICE_URL}
      POS_WEBHOOK_SERVICE_URL: ${RAFIKI_BACKEND_POS_WEBHOOK_SERVICE_URL}
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - host.docker.internal:host-gateway
    labels:
      - traefik.enable=true
      - traefik.docker.network=testnet
      # Admin GraphQL API (port 3001) — higher priority path match
      - traefik.http.routers.rafiki-backend-admin.rule=Host(`rafiki-backend.testnet.test`) && PathPrefix(`/graphql`)
      - traefik.http.routers.rafiki-backend-admin.entrypoints=websecure
      - traefik.http.routers.rafiki-backend-admin.tls=true
      - traefik.http.routers.rafiki-backend-admin.priority=100
      - traefik.http.routers.rafiki-backend-admin.service=rafiki-backend-admin
      - traefik.http.services.rafiki-backend-admin.loadbalancer.server.port=3001
      # Open Payments API (port 3003) — catch-all for everything else
      - traefik.http.routers.rafiki-backend.rule=Host(`rafiki-backend.testnet.test`)
      - traefik.http.routers.rafiki-backend.entrypoints=websecure
      - traefik.http.routers.rafiki-backend.tls=true
      - traefik.http.routers.rafiki-backend.service=rafiki-backend
      - traefik.http.services.rafiki-backend.loadbalancer.server.port=3003

  rafiki-frontend:
    container_name: rafiki-frontend-local
    image: ghcr.io/interledger/rafiki-frontend:v2.2.0-beta
    depends_on:
      - rafiki-backend
    restart: always
    privileged: true
    ports:
      - '3012:3012'
    networks:
      - testnet
    environment:
      PORT: ${RAFIKI_FRONTEND_PORT}
      GRAPHQL_URL: ${RAFIKI_GRAPHQL_URL}
      OPEN_PAYMENTS_URL: ${RAFIKI_FRONTEND_OPEN_PAYMENTS_URL}
      ENABLE_INSECURE_MESSAGE_COOKIE: ${RAFIKI_FRONTEND_ENABLE_INSECURE_MESSAGE_COOKIE}
      AUTH_ENABLED: ${RAFIKI_FRONTEND_AUTH_ENABLED}
      SIGNATURE_VERSION: ${RAFIKI_FRONTEND_SIGNATURE_VERSION}
    labels:
      - traefik.enable=true
      - traefik.docker.network=testnet
      - traefik.http.routers.rafiki-frontend.rule=Host(`rafiki-frontend.testnet.test`)
      - traefik.http.routers.rafiki-frontend.entrypoints=websecure
      - traefik.http.routers.rafiki-frontend.tls=true
      - traefik.http.services.rafiki-frontend.loadbalancer.server.port=3012

  rafiki-card-service:
    container_name: rafiki-card-service-local
    image: ghcr.io/interledger/rafiki-card-service:v2.2.0-beta
    restart: always
    privileged: true
    networks:
      - testnet
    ports:
      - '3007:3007'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      CARD_SERVICE_PORT: ${RAFIKI_CARD_SERVICE_PORT:-3007}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GRAPHQL_URL: ${RAFIKI_GRAPHQL_URL:-http://rafiki-backend:3001/graphql}
      TENANT_ID: ${OPERATOR_TENANT_ID:-f829c064-762a-4430-ac5d-7af5df198551}
      TENANT_SECRET: ${ADMIN_API_SECRET:-secret-key}
      TENANT_SIGNATURE_VERSION: ${RAFIKI_CARD_SERVICE_TENANT_SIGNATURE_VERSION:-1}
    labels:
      - traefik.enable=true
      - traefik.docker.network=testnet
      - traefik.http.routers.rafiki-card-service.rule=Host(`rafiki-card-service.testnet.test`)
      - traefik.http.routers.rafiki-card-service.entrypoints=websecure
      - traefik.http.routers.rafiki-card-service.tls=true
      - traefik.http.services.rafiki-card-service.loadbalancer.server.port=3007
