services:
  # Rafiki
  rafiki-auth:
    container_name: rafiki-auth-local
    image: ghcr.io/interledger/rafiki-auth:v2.4.1-beta
    restart: unless-stopped
    networks:
      - testnet
    ports:
      - '3006:3006'
      - '3008:3008'
      - '3009:3009'
    environment:
      AUTH_PORT: ${RAFIKI_AUTH_PORT:-3006}
      INTROSPECTION_PORT: ${RAFIKI_AUTH_INTROSPECTION_PORT:-3007}
      ADMIN_PORT: ${RAFIKI_AUTH_ADMIN_PORT:-3008}
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${RAFIKI_AUTH_LOG_LEVEL:-debug}
      TRUST_PROXY: ${RAFIKI_AUTH_TRUST_PROXY:-true}
      NODE_TLS_REJECT_UNAUTHORIZED: ${RAFIKI_AUTH_NODE_TLS_REJECT_UNAUTHORIZED:-0}
      AUTH_SERVER_URL: ${RAFIKI_AUTH_SERVER_URL:-https://auth.testnet.test}
      AUTH_DATABASE_URL: ${RAFIKI_AUTH_DATABASE_URL:-postgresql://rafiki_auth:rafiki_auth@postgres-local/rafiki_auth}
      IDENTITY_SERVER_URL: ${AUTH_IDENTITY_SERVER_URL:-https://testnet.test/grant-interactions}
      IDENTITY_SERVER_SECRET: ${AUTH_IDENTITY_SERVER_SECRET:-dev_identity_server_secret}
      COOKIE_KEY: ${AUTH_COOKIE_KEY:-8fd398393c47dd27a3167d9c081c094f}
      INTERACTION_COOKIE_SAME_SITE: ${RAFIKI_AUTH_INTERACTION_COOKIE_SAME_SITE:-lax}
      WAIT_SECONDS: ${RAFIKI_AUTH_WAIT_SECONDS:-1}
      OPERATOR_TENANT_ID: ${RAFIKI_OPERATOR_TENANT_ID:-f829c064-762a-4430-ac5d-7af5df198551}
      ADMIN_API_SECRET: ${RAFIKI_ADMIN_API_SECRET:-secret-key}
      ADMIN_SIGNATURE_VERSION: ${RAFIKI_ADMIN_SIGNATURE_VERSION:-1}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      
    extra_hosts:
      - testnet.test:host-gateway
      - api.testnet.test:host-gateway
      - auth.testnet.test:host-gateway
      - rafiki-backend.testnet.test:host-gateway
      - rafiki-frontend.testnet.test:host-gateway
      - rafiki-card-service.testnet.test:host-gateway
      - mockgatehub.testnet.test:host-gateway
      - boutique.test:host-gateway
      - api.boutique.test:host-gateway
    depends_on:
      # Wait for Postgres to accept connections before booting. Otherwise the
      # startup migration fails, start() throws (only logged, not fatal) and the
      # admin server never starts while the container restart-loops.
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=testnet

      - traefik.http.routers.rafiki-auth-admin.rule=Host(`auth.testnet.test`) && PathPrefix(`/graphql`)
      - traefik.http.routers.rafiki-auth-admin.entrypoints=websecure
      - traefik.http.routers.rafiki-auth-admin.tls=true
      - traefik.http.routers.rafiki-auth-admin.priority=110
      - traefik.http.routers.rafiki-auth-admin.service=rafiki-auth-admin
      - traefik.http.services.rafiki-auth-admin.loadbalancer.server.port=3008

      - traefik.http.routers.rafiki-auth-grant.rule=Host(`auth.testnet.test`) && PathPrefix(`/grant`)
      - traefik.http.routers.rafiki-auth-grant.entrypoints=websecure
      - traefik.http.routers.rafiki-auth-grant.tls=true
      - traefik.http.routers.rafiki-auth-grant.priority=100
      - traefik.http.routers.rafiki-auth-grant.service=rafiki-auth-grant
      - traefik.http.services.rafiki-auth-grant.loadbalancer.server.port=3009

      - traefik.http.routers.rafiki-auth.rule=Host(`auth.testnet.test`)
      - traefik.http.routers.rafiki-auth.entrypoints=websecure
      - traefik.http.routers.rafiki-auth.tls=true
      - traefik.http.routers.rafiki-auth.service=rafiki-auth
      - traefik.http.services.rafiki-auth.loadbalancer.server.port=3006

  rafiki-backend:
    container_name: rafiki-backend-local
    # image: ghcr.io/interledger/rafiki-backend:v2.4.1-beta
    build:
      context: ..//../rafiki
      dockerfile: packages/backend/Dockerfile.prod
    restart: always
    privileged: true
    volumes:
      - ../temp/:/workspace/temp/
    ports:
      - '3011:3001'
      - '3010:3003'
      - '3005:3005'
      - '3002:3002'
    networks:
      - testnet
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NODE_TLS_REJECT_UNAUTHORIZED: ${RAFIKI_BACKEND_NODE_TLS_REJECT_UNAUTHORIZED:-0}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      TRUST_PROXY: ${RAFIKI_BACKEND_TRUST_PROXY:-true}
      ADMIN_PORT: ${RAFIKI_BACKEND_ADMIN_PORT:-3001}
      CONNECTOR_PORT: ${RAFIKI_BACKEND_CONNECTOR_PORT:-3002}
      OPEN_PAYMENTS_PORT: ${RAFIKI_BACKEND_OPEN_PAYMENTS_PORT:-3003}
      DATABASE_URL: ${RAFIKI_BACKEND_DATABASE_URL:-postgresql://rafiki_backend:rafiki_backend@postgres-local/rafiki_backend}
      USE_TIGERBEETLE: ${RAFIKI_BACKEND_USE_TIGERBEETLE:-false}
      NONCE_REDIS_KEY: ${RAFIKI_BACKEND_NONCE_REDIS_KEY:-test}
      AUTH_SERVER_GRANT_URL: ${RAFIKI_BACKEND_AUTH_SERVER_GRANT_URL:-https://auth.testnet.test}
      AUTH_SERVER_INTROSPECTION_URL: ${RAFIKI_BACKEND_AUTH_SERVER_INTROSPECTION_URL:-http://rafiki-auth:3007}
      ILP_ADDRESS: ${RAFIKI_BACKEND_ILP_ADDRESS:-test.net}
      ILP_CONNECTOR_URL: ${RAFIKI_BACKEND_ILP_CONNECTOR_URL:-http://127.0.0.1:3002}
      STREAM_SECRET: ${RAFIKI_BACKEND_STREAM_SECRET:-BjPXtnd00G2mRQwP/8ZpwyZASOch5sUXT5o0iR5b5wU=}
      ADMIN_KEY: ${RAFIKI_BACKEND_ADMIN_KEY:-admin}
      OPEN_PAYMENTS_URL: ${RAFIKI_BACKEND_OPEN_PAYMENTS_URL:-https://rafiki-backend.testnet.test}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WALLET_ADDRESS_URL: ${RAFIKI_BACKEND_WALLET_ADDRESS_URL:-https://rafiki-backend.testnet.test/.well-known/pay}
      WEBHOOK_URL: ${RAFIKI_BACKEND_WEBHOOK_URL:-http://host.docker.internal:3003/webhooks}
      WEBHOOK_TIMEOUT: ${RAFIKI_BACKEND_WEBHOOK_TIMEOUT:-60000}
      SIGNATURE_SECRET: ${RAFIKI_SIGNATURE_SECRET:-327132b5-99e9-4eb8-8a25-2b7d7738ece1}
      EXCHANGE_RATES_URL: ${RAFIKI_BACKEND_EXCHANGE_RATES_URL:-http://host.docker.internal:3003/rates}
      ENABLE_AUTO_PEERING: ${RAFIKI_BACKEND_ENABLE_AUTO_PEERING:-true}
      AUTO_PEERING_SERVER_PORT: ${RAFIKI_BACKEND_AUTO_PEERING_SERVER_PORT:-3005}
      INSTANCE_NAME: ${RAFIKI_BACKEND_INSTANCE_NAME:-Testnet Wallet}
      SLIPPAGE: ${RAFIKI_BACKEND_SLIPPAGE:-0.01}
      KEY_ID: ${RAFIKI_BACKEND_KEY_ID:-rafiki}
      WALLET_ADDRESS_REDIRECT_HTML_PAGE: ${RAFIKI_BACKEND_WALLET_ADDRESS_REDIRECT_HTML_PAGE:-https://testnet.test/account?walletAddress=%ewa}
      OPERATOR_TENANT_ID: ${OPERATOR_TENANT_ID:-f829c064-762a-4430-ac5d-7af5df198551}
      ADMIN_API_SECRET: ${RAFIKI_ADMIN_API_SECRET:-secret-key}
      ADMIN_SIGNATURE_VERSION: ${ADMIN_SIGNATURE_VERSION:-1}
      AUTH_SERVICE_API_URL: ${RAFIKI_BACKEND_AUTH_SERVICE_API_URL:-http://rafiki-auth:3011}
      CARD_SERVICE_URL: ${RAFIKI_BACKEND_CARD_SERVICE_URL:-http://rafiki-card-service:3007}
      CARD_WEBHOOK_SERVICE_URL: ${RAFIKI_BACKEND_CARD_WEBHOOK_SERVICE_URL:-http://rafiki-card-service:3007/webhook}
      POS_SERVICE_URL: ${RAFIKI_BACKEND_POS_SERVICE_URL:-http://rafiki-pos-service:3014}
      POS_WEBHOOK_SERVICE_URL: ${RAFIKI_BACKEND_POS_WEBHOOK_SERVICE_URL:-http://rafiki-pos-service:3014/web}
      OUTGOING_PAYMENT_WORKERS: 4
      WEBHOOK_WORKERS: 4
      WEBHOOK_WORKER_BATCH_SIZE: 50
      OUTGOING_PAYMENT_WORKER_BATCH_SIZE: 50
      OUTGOING_PAYMENT_PROCESSING_INTERVAL_MS: 300
      # Bound how many payments in a batch process concurrently. Each in-flight
      # payment can check out its own DB connection for Postgres accounting, so
      # keep this well below DATABASE_POOL_MAX to leave headroom for the API and
      # webhook-driven liquidity deposits — otherwise the pool starves and
      # create/quote requests time out (the connection-pool incident).
      OUTGOING_PAYMENT_WORKER_CONCURRENCY: 40
      # Connection pool ceiling (previously hardcoded to 10). Sized for OP worker
      # concurrency (~11 conns) + webhook worker + API + liquidity callbacks.
      DATABASE_POOL_MAX: 50
    depends_on:
      # Wait for Postgres/Redis readiness before booting. Otherwise the startup
      # migration + operator-tenant seed fails, start() throws (only logged),
      # the admin server never comes up and the container restart-loops — which
      # makes the rafiki-assets setup step time out and silently skip creating
      # the default USD/EUR assets.
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - host.docker.internal:host-gateway
      - testnet.test:host-gateway
      - rafiki-backend.testnet.test:host-gateway
      - auth.testnet.test:host-gateway
    labels:
      - traefik.enable=true
      - traefik.docker.network=testnet
      # Admin GraphQL API (port 3001) — higher priority path match
      - traefik.http.routers.rafiki-backend-admin.rule=Host(`rafiki-backend.testnet.test`) && PathPrefix(`/graphql`)
      - traefik.http.routers.rafiki-backend-admin.entrypoints=websecure
      - traefik.http.routers.rafiki-backend-admin.tls=true
      - traefik.http.routers.rafiki-backend-admin.priority=100
      - traefik.http.routers.rafiki-backend-admin.service=rafiki-backend-admin
      - traefik.http.services.rafiki-backend-admin.loadbalancer.server.port=3001
      # Open Payments API (port 3003) — catch-all for everything else
      - traefik.http.routers.rafiki-backend.rule=Host(`rafiki-backend.testnet.test`)
      - traefik.http.routers.rafiki-backend.entrypoints=websecure
      - traefik.http.routers.rafiki-backend.tls=true
      - traefik.http.routers.rafiki-backend.service=rafiki-backend
      - traefik.http.services.rafiki-backend.loadbalancer.server.port=3003

  rafiki-frontend:
    container_name: rafiki-frontend-local
    image: ghcr.io/interledger/rafiki-frontend:v2.4.1-beta
    depends_on:
      - rafiki-backend
    restart: always
    privileged: true
    ports:
      - '3012:3012'
    networks:
      - testnet
    environment:
      PORT: ${RAFIKI_FRONTEND_PORT:-3012}
      GRAPHQL_URL: ${RAFIKI_GRAPHQL_URL:-http://rafiki-backend:3001/graphql}
      OPEN_PAYMENTS_URL: ${RAFIKI_FRONTEND_OPEN_PAYMENTS_URL:-https://rafiki-backend.testnet.test/}
      ENABLE_INSECURE_MESSAGE_COOKIE: ${RAFIKI_FRONTEND_ENABLE_INSECURE_MESSAGE_COOKIE:-true}
      AUTH_ENABLED: ${RAFIKI_FRONTEND_AUTH_ENABLED:-false}
      SIGNATURE_VERSION: ${RAFIKI_FRONTEND_SIGNATURE_VERSION:-1}
    labels:
      - traefik.enable=true
      - traefik.docker.network=testnet
      - traefik.http.routers.rafiki-frontend.rule=Host(`rafiki-frontend.testnet.test`)
      - traefik.http.routers.rafiki-frontend.entrypoints=websecure
      - traefik.http.routers.rafiki-frontend.tls=true
      - traefik.http.services.rafiki-frontend.loadbalancer.server.port=3012

  rafiki-card-service:
    container_name: rafiki-card-service-local
    image: ghcr.io/interledger/rafiki-card-service:v2.4.1-beta
    restart: always
    privileged: true
    networks:
      - testnet
    ports:
      - '3007:3007'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      CARD_SERVICE_PORT: ${RAFIKI_CARD_SERVICE_PORT:-3007}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GRAPHQL_URL: ${RAFIKI_GRAPHQL_URL:-http://rafiki-backend:3001/graphql}
      TENANT_ID: ${OPERATOR_TENANT_ID:-f829c064-762a-4430-ac5d-7af5df198551}
      TENANT_SECRET: ${ADMIN_API_SECRET:-secret-key}
      TENANT_SIGNATURE_VERSION: ${RAFIKI_CARD_SERVICE_TENANT_SIGNATURE_VERSION:-1}
    labels:
      - traefik.enable=true
      - traefik.docker.network=testnet
      - traefik.http.routers.rafiki-card-service.rule=Host(`rafiki-card-service.testnet.test`)
      - traefik.http.routers.rafiki-card-service.entrypoints=websecure
      - traefik.http.routers.rafiki-card-service.tls=true
      - traefik.http.services.rafiki-card-service.loadbalancer.server.port=3007
