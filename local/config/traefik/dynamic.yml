tls:
  certificates:
    - certFile: /certs/local.crt
      keyFile: /certs/local.key
    - certFile: /certs/boutique.crt
      keyFile: /certs/boutique.key
  stores:
    default:
      defaultCertificate:
        certFile: /certs/local.crt
        keyFile: /certs/local.key

http:
  routers:
    boutique-frontend:
      rule: Host(`boutique.test`)
      entryPoints:
        - websecure
      tls: true
      service: boutique-frontend

  services:
    boutique-frontend:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:4004
