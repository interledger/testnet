suite: testnet-wallet secrets - Secrets
templates:
  - secrets.backend.yaml
set:
  fullnameOverride: test-testnet-wallet
  config:
    backend:
      shouldCreateSecrets: true
      database:
        url:
          value: 'postgres://username:password@postgres-host/database_name'
      redis:
        url:
          value: 'redis://redis-test.interledger-test:6379'
release:
  name: test-testnet-wallet
tests:
  - it: 'backend secret should be created when shouldCreateSecrets is true'
    asserts:
      - equal:
          path: metadata.name
          value: test-testnet-wallet-backend
      - equal:
          path: kind
          value: Secret
      - equal:
          path: data["databaseUrl"]
          value: 'cG9zdGdyZXM6Ly91c2VybmFtZTpwYXNzd29yZEBwb3N0Z3Jlcy1ob3N0L2RhdGFiYXNlX25hbWU='
      - equal:
          path: data["redis.url"]
          value: 'cmVkaXM6Ly9yZWRpcy10ZXN0LmludGVybGVkZ2VyLXRlc3Q6NjM3OQ=='
  - it: 'backend secret should not be created when shouldCreateSecrets is false'
    set:
      config:
        backend:
          shouldCreateSecrets: false
    asserts:
      - hasDocuments:
          count: 0
