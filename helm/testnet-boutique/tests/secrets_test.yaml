suite: testnet-boutique secrets - Secrets
templates:
  - secrets.backend.yaml
set:
  fullnameOverride: test-testnet-boutique
  config:
    backend:
      shouldCreateSecrets: true
release:
  name: test-testnet-boutique
tests:
  - it: 'backend secret should be created when shouldCreateSecrets is true'
    set:
      config:
        backend:
          shouldCreateSecrets: true
          database:
            url:
              value: 'postgres://username:password@postgres-host/database_name'
          privateKey:
            value: 'LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCnRlc3Qta2V5Ci0tLS0tRU5EIFBSSVZBVEUgS0VZLS0tLS0K'
    asserts:
      - equal:
          path: metadata.name
          value: test-testnet-boutique-backend
      - equal:
          path: kind
          value: Secret
      - equal:
          path: data["database.url"]
          value: 'cG9zdGdyZXM6Ly91c2VybmFtZTpwYXNzd29yZEBwb3N0Z3Jlcy1ob3N0L2RhdGFiYXNlX25hbWU='
      - isNotEmpty:
          path: data["privateKey"]
  - it: 'backend secret should not be created when shouldCreateSecrets is false'
    set:
      config:
        backend:
          shouldCreateSecrets: false
    asserts:
      - hasDocuments:
          count: 0
