services:
  redis:
    image: redis:7-alpine
    container_name: mockgatehub-test-redis
    ports:
      - "26380:6379"  # Use different port to avoid conflicts
    command: redis-server --save "" --appendonly no  # No persistence
    networks:
      - mockgatehub-test

  mockgatehub:
    build:
      context: ../../../
      dockerfile: packages/mockgatehub/Dockerfile
    container_name: mockgatehub-test
    ports:
      - "28080:8080"  # Use different port to avoid conflicts
    environment:
      - PORT=8080
      - USE_REDIS=true
      - REDIS_URL=redis://redis:6379
      - REDIS_DB=0
      - WEBHOOK_URL=http://mockgatehub:8080/test-webhook
      - WEBHOOK_SECRET=test-webhook-secret
    depends_on:
      - redis
    networks:
      - mockgatehub-test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  mockgatehub-test:
    driver: bridge
