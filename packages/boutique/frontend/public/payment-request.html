<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Request Demo</title>
</head>
<body>

  <h3>Live Output</h3>
<div id="output" class="output">
  <div id="content">
<div><button id="buyButton">Buy</button></div>
<div><pre id="result"></pre></div>
</div>
  <div id="status"></div>
  <pre id="log"></pre>
</div>

  <script>
/**
 * Builds PaymentRequest for the BobBucks payment method, but does not show any UI yet.
 *
 * @return {PaymentRequest} The PaymentRequest oject.
 */
function initPaymentRequest() {
  let supportedInstruments = [{
    supportedMethods: 'http://localhost:4003/pay',
    data: {
      walletAddress: 'http://rafiki-backend/sid2',
      message: 'Donation'
    }
  }];

  let details = {
    total: {label: 'Donation', amount: {currency: 'USD', value: '55.00'}},
    displayItems: [
      {
        label: 'Original donation amount',
        amount: {currency: 'USD', value: '65.00'},
      },
      {
        label: 'Friends and family discount',
        amount: {currency: 'USD', value: '-10.00'},
      },
    ],
  };

  return new PaymentRequest(supportedInstruments, details);
}

/**
 * Invokes PaymentRequest for the BobBucks payment method.
 *
 * @param {PaymentRequest} request The PaymentRequest object.
 */
function onBuyClicked(request) {
  request.show().then(function(instrumentResponse) {
    sendPaymentToServer(instrumentResponse);
  })
  .catch(function(err) {
    console.error(err);
  });
}

/**
 * Simulates processing the payment data on the server.
 *
 * @param {PaymentResponse} instrumentResponse The payment information to
 * process.
 */
function sendPaymentToServer(instrumentResponse) {
  // There's no server-side component of these samples. No transactions are
  // processed and no money exchanged hands. Instantaneous transactions are not
  // realistic. Add a 2 second delay to make it seem more real.
  window.setTimeout(function() {
    instrumentResponse.complete('success')
        .then(function() {
          document.getElementById('result').innerHTML =
              instrumentToJsonString(instrumentResponse);
        })
        .catch(function(err) {
          console.error(err);
        });
  }, 2000);
}

/**
 * Converts the payment instrument into a JSON string.
 *
 * @private
 * @param {PaymentResponse} instrument The instrument to convert.
 * @return {string} The JSON string representation of the instrument.
 */
function instrumentToJsonString(instrument) {
  let details = instrument.details;

  return JSON.stringify({
    methodName: instrument.methodName,
    details: details,
  }, undefined, 2);
}

/** @type {HTMLButtonElement} */
const payButton = document.getElementById('buyButton');
if (window.PaymentRequest) {
  let request = initPaymentRequest();
  payButton.addEventListener('click', () => {
    onBuyClicked(request);
    request = initPaymentRequest();
  });
} else {
  payButton.disabled = true;
  const msg = 'This browser does not support web payments';
  payButton.insertAdjacentText('afterend', msg);
  console.error(msg);
}
</script>
</body>
</html>
